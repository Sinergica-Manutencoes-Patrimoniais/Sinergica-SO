# Sincroniza secrets de runtime das Edge Functions (Deno.env) com o Supabase.
#
# A GitHub Integration nativa do Supabase (Dashboard → Settings → Integrations → GitHub) aplica
# migrations e o código das Edge Functions no merge — mas NÃO sincroniza `supabase secrets set`.
# Sem este workflow, `AUVO_API_KEY` etc. só existiriam em `.env.local` (dev) e as Edge Functions
# em produção quebrariam por falta de env var. Ver docs/STATE.md e
# specs/E01-S09-integracao-auvo-fundacao/tasks.md (task 2).
#
# Só roda quando um secret pode ter mudado — não há como o GitHub Actions "diffar" valores de
# secret (são opacos por design), então o gatilho é manual (`workflow_dispatch`) mais um caminho
# automático só quando os arquivos que costumam acompanhar mudança de integração são tocados
# (novas Edge Functions, docs de config de integração) — best-effort, não uma garantia.
#
# SUPABASE_URL/SUPABASE_ANON_KEY/SUPABASE_SERVICE_ROLE_KEY/SUPABASE_DB_URL são injetados
# automaticamente pelo runtime da Edge Function — nunca via `secrets set` (prefixo `SUPABASE_` é
# reservado e a CLI rejeita).

name: Sync Secrets (Supabase Edge Functions)

on:
  workflow_dispatch: # gatilho manual consciente — @devops decide quando rodar
  # Automático desligado por enquanto: se SUPABASE_ACCESS_TOKEN não for um PAT `sbp_...`, o
  # workflow falha antes de sincronizar. Rode manualmente depois de corrigir os secrets.
  # push:
  #   branches: [main]
  #   paths:
  #     - "supabase/functions/**"
  #     - ".github/workflows/sync-secrets.yml"

concurrency:
  group: sync-secrets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validar secrets do Supabase CLI
        run: |
          case "$SUPABASE_ACCESS_TOKEN" in
            sbp_*) ;;
            *)
              echo "::error::SUPABASE_ACCESS_TOKEN inválido. Use um Personal Access Token da Supabase no formato sbp_..., não service_role, anon key, project ref ou DB password."
              exit 1
              ;;
          esac
          test -n "$SUPABASE_PROJECT_ID" || { echo "::error::SUPABASE_PROJECT_ID ausente"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::error::SUPABASE_DB_PASSWORD ausente"; exit 1; }
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Link ao projeto
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Um secret por linha (nunca interpolar valor direto no `run:` — vaza no log em caso de
      # erro do comando). `supabase secrets set` sobrescreve se já existir, idempotente.
      - name: Sincronizar secrets das Edge Functions
        run: |
          set_if_present() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              supabase secrets set "$key=$value"
            else
              echo "::warning::$key ausente no GitHub; valor remoto preservado"
            fi
          }
          set_if_present AUVO_API_KEY "$AUVO_API_KEY"
          set_if_present AUVO_USER_TOKEN "$AUVO_USER_TOKEN"
          set_if_present AUVO_WEBHOOK_SECRET "$AUVO_WEBHOOK_SECRET"
          set_if_present EVOLUTION_API_URL "$EVOLUTION_API_URL"
          set_if_present EVOLUTION_API_KEY "$EVOLUTION_API_KEY"
          set_if_present EVOLUTION_HMAC_SECRET "$EVOLUTION_HMAC_SECRET"
          set_if_present META_ACCESS_TOKEN "$META_ACCESS_TOKEN"
          set_if_present META_APP_SECRET "$META_APP_SECRET"
          set_if_present OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          set_if_present CORS_ALLOWED_ORIGINS "$CORS_ALLOWED_ORIGINS"
          supabase secrets set META_GRAPH_VERSION=v22.0
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          AUVO_API_KEY: ${{ secrets.AUVO_API_KEY }}
          AUVO_USER_TOKEN: ${{ secrets.AUVO_USER_TOKEN }}
          # Ausentes são ignorados pelo script acima: nunca apagamos um secret remoto por engano.
          AUVO_WEBHOOK_SECRET: ${{ secrets.AUVO_WEBHOOK_SECRET }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_HMAC_SECRET: ${{ secrets.EVOLUTION_HMAC_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
