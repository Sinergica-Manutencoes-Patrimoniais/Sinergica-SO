name: CI (OS monorepo)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # turbo precisa do histórico para calcular o "affected"
      # Sem `with: version` — pnpm/action-setup@v4 recusa rodar se a versão também estiver
      # fixada no package.json (`packageManager: pnpm@9.0.0`), erro "Multiple versions of pnpm
      # specified". A versão vem só do packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # dependency-cruiser 18 exige Node ^22||^24||>=26 (arch:check falhava em "20").
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Gates da esteira SDD (no monorepo inteiro)
      - name: Auditoria da esteira
        run: pnpm run audit:esteira
      - name: Fidelidade spec→implementação
        run: pnpm run eval:spec
      - name: Diagramas Mermaid
        run: node scripts/validate-mermaid.mjs

      # Gates de segurança (BLOQUEANTES)
      # gitleaks via CLI (MIT, grátis) — a gitleaks-action exige GITLEAKS_LICENSE em repos de
      # organização (caso deste repo) e falha sem ela.
      - name: Secret scanning (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1
      - name: Dependências vulneráveis (runtime)
        run: pnpm audit --prod --audit-level=high

      # Gates de código — só nos pacotes AFETADOS (turbo affected) para feedback rápido
      - name: Lint / typecheck / test (affected)
        run: pnpm turbo run lint typecheck test --filter="...[origin/${{ github.base_ref || 'main' }}]"
      - name: Arquitetura (dependência DDD por máquina)
        run: pnpm run arch:check

  migrations:
    # Squawk = SEGURANÇA de migration (locks, breaking change, downtime). lint-migrations.mjs =
    # convenções da Trivia que nenhum tool pronto cobre (DROP sem reverso, CREATE POLICY sem
    # GRANT). Separado porque roda mesmo em PR que não toca código, e é barato.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Squawk (segurança de migration)
        uses: sbdchd/squawk-action@v2
        with:
          pattern: |
            supabase/migrations/*.sql
          config: .squawk.toml
          # Supabase roda cada migration dentro de transação — sem isto, Squawk avisa "sem
          # transação" em toda migration (falso positivo para este ambiente).
          assume-in-transaction: "true"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Convenções de migration (DROP sem reverso, CREATE POLICY sem GRANT)
        run: node scripts/lint-migrations.mjs

  db-tests:
    # Roda migrations + pgTAP contra um Postgres local via Docker — runners do GitHub Actions já
    # têm Docker. Substitui a necessidade de Docker local para validar RLS/invariantes de banco
    # (ver STATE.md e specs/E00-S05-autenticacao-autorizacao/tasks.md — "Pendências antes do merge").
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Subir Supabase local (Docker) — aplica migrations do zero
        run: supabase start
      - name: pgTAP — RLS e invariantes (supabase/tests/)
        run: supabase test db
